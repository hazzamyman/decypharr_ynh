location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__/;

    # Required headers for qBittorrent API compatibility
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (used by Decypharr's web UI for live updates)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Large timeouts for long-running downloads/streams
    proxy_read_timeout  3600;
    proxy_send_timeout  3600;
    proxy_connect_timeout 60;

    # Allow large NZB/torrent uploads
    client_max_body_size 100M;

    proxy_redirect off;

    # SSO protection is handled by yunohost's default auth block;
    # Decypharr also has its own auth — both protect the UI.
    more_set_headers "Content-Security-Policy: default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self' wss:";
}
