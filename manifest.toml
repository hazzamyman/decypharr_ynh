packaging_format = 2

id = "decypharr"
name = "Decypharr"
description.en = "Debrid client with qBittorrent API, WebDAV, and *arr integration"
description.fr = "Client Debrid avec API qBittorrent, WebDAV, et intégration *arr"

version = "1.1.6~ynh1"

maintainers = ["your-name"]

[upstream]
license = "MIT"
website = "https://docs.decypharr.com"
admindoc = "https://docs.decypharr.com/guides/configuration"
code = "https://github.com/sirrobot01/decypharr"

[integration]
yunohost = ">= 11.2"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = "not_relevant"
sso = "not_relevant"
disk = "200M"
ram.build = "50M"
ram.runtime = "200M"

[install]

    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "admins"

    [install.debrid_provider]
    ask.en = "Which Debrid provider will you use?"
    ask.fr = "Quel fournisseur Debrid allez-vous utiliser ?"
    type = "select"
    choices = ["realdebrid", "alldebrid", "debridlink", "torbox"]
    default = "realdebrid"

    [install.debrid_api_key]
    ask.en = "Your Debrid provider API key"
    ask.fr = "Votre clé API du fournisseur Debrid"
    type = "string"
    example = "XXXXXXXXXXXXXXXXXXXX"

    [install.download_uncached]
    ask.en = "Allow downloading uncached torrents? (slower, uses provider quota)"
    ask.fr = "Autoriser le téléchargement de torrents non mis en cache ?"
    type = "boolean"
    default = false

    [install.mount_type]
    ask.en = "Filesystem mount type (none = no mounting, dfs = built-in VFS, rclone = embedded rclone)"
    ask.fr = "Type de montage système de fichiers"
    type = "select"
    choices = ["none", "dfs", "rclone"]
    default = "none"

    [install.log_level]
    ask.en = "Log level"
    ask.fr = "Niveau de journalisation"
    type = "select"
    choices = ["debug", "info", "warn", "error"]
    default = "info"

[resources]

    [resources.sources]

        [resources.sources.main]
        in_subdir = false
        # x86_64 / amd64
        amd64.url = "https://github.com/sirrobot01/decypharr/releases/download/v1.1.6/decypharr_Linux_x86_64.tar.gz"
        amd64.sha256 = "52ebc52a33b75bd3b68d1958364325644fed2e731103a03abe89851bca07f333"
        # arm64
        arm64.url = "https://github.com/sirrobot01/decypharr/releases/download/v1.1.6/decypharr_Linux_arm64.tar.gz"
        arm64.sha256 = "62c3be04be01a933b6a71eca8f5df8a4c8636437034f14444d4e9ef86c52e3bc"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "decypharr_Linux_x86_64.tar.gz"
        autoupdate.asset.arm64 = "decypharr_Linux_arm64.tar.gz"

    [resources.system_user]

    [resources.install_dir]
    # Stores the binary; defaults to /var/www/decypharr
    dir = "/opt/decypharr"
    owner = "decypharr:decypharr"

    [resources.data_dir]
    # config.json and runtime data live here
    dir = "/var/lib/decypharr"
    owner = "decypharr:decypharr"

    [resources.ports]
    main.default = 8282

    [resources.apt]
    packages = "fuse3"
